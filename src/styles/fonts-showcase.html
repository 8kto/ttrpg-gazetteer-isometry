<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Font Showcase</title>
    <link rel="stylesheet" href="fonts/fonts-test.css" />
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      :root {
        --bg: #f5f4f0;
        --surface: #ffffff;
        --border: #e0ddd6;
        --text: #1a1916;
        --text-muted: #6b6a66;
        --text-faint: #a09f9b;
        --accent: #2a2724;
        --radius: 8px;
        --radius-lg: 12px;
      }

      body {
        background: var(--bg);
        color: var(--text);
        font-family: 'Georgia', serif;
        padding: 2rem 1.5rem 4rem;
        max-width: 860px;
        margin: 0 auto;
      }

      h1 {
        font-size: 13px;
        font-family: monospace;
        font-weight: normal;
        color: var(--text-muted);
        letter-spacing: 0.08em;
        text-transform: uppercase;
        margin-bottom: 1.5rem;
        padding-bottom: 1rem;
        border-bottom: 1px solid var(--border);
      }

      .controls {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: var(--radius-lg);
        padding: 1rem 1.25rem;
        margin-bottom: 2rem;
        display: flex;
        flex-direction: column;
        gap: 10px;
      }

      .controls label {
        font-size: 11px;
        font-family: monospace;
        letter-spacing: 0.07em;
        text-transform: uppercase;
        color: var(--text-faint);
      }

      textarea {
        width: 100%;
        min-height: 72px;
        resize: vertical;
        font-family: 'Georgia', serif;
        font-size: 15px;
        padding: 8px 10px;
        border: 1px solid var(--border);
        border-radius: var(--radius);
        background: var(--bg);
        color: var(--text);
        line-height: 1.5;
        outline: none;
      }
      textarea:focus {
        border-color: #aaa;
      }

      .size-row {
        display: flex;
        align-items: center;
        gap: 12px;
      }
      .size-row input[type='range'] {
        flex: 1;
        max-width: 200px;
        accent-color: var(--accent);
      }
      .size-val {
        font-family: monospace;
        font-size: 12px;
        color: var(--text-muted);
        min-width: 36px;
      }

      .grid {
        display: flex;
        flex-direction: column;
        gap: 6px;
      }

      .card {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: var(--radius-lg);
        overflow: hidden;
      }

      .card-header {
        padding: 6px 14px;
        background: var(--bg);
        border-bottom: 1px solid var(--border);
        display: flex;
        align-items: baseline;
        gap: 10px;
      }

      .fname {
        font-family: monospace;
        font-size: 11px;
        font-weight: bold;
        color: var(--text-muted);
        letter-spacing: 0.04em;
      }

      .fmeta {
        font-family: monospace;
        font-size: 10px;
        color: var(--text-faint);
      }

      .card-body {
        padding: 12px 14px 14px;
      }

      .preview-line {
        white-space: pre-wrap;
        word-break: break-word;
        line-height: 1.3;
        color: var(--text);
      }

      .variant-row {
        margin-top: 8px;
        padding-top: 8px;
        border-top: 1px solid var(--border);
      }

      .variant-label {
        font-family: monospace;
        font-size: 9px;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        color: var(--text-faint);
        margin-bottom: 3px;
      }
    </style>
  </head>
  <body>
    <h1>Font Showcase</h1>

    <div class="controls">
      <label for="inp">Preview text</label>
      <textarea id="inp" spellcheck="false">
The quick brown fox
jumps over the lazy dog.
Съешь ещё этих мягких французских булок, да выпей чаю.</textarea>
      <div class="size-row">
        <label for="sz">Size</label>
        <input type="range" id="sz" min="12" max="96" value="32" step="1" />
        <span class="size-val" id="szv">32px</span>
      </div>
    </div>

    <div class="grid" id="grid"></div>

    <script>
      const fonts = [
        {
          label: 'Antykwa Torunska',
          family: 'Antykwa Torunska',
          variants: [
            { w: 300, s: 'normal', tag: 'Light' },
            { w: 300, s: 'italic', tag: 'Light Italic' },
            { w: 400, s: 'normal', tag: 'Regular' },
            { w: 400, s: 'italic', tag: 'Italic' },
            { w: 500, s: 'normal', tag: 'Medium' },
            { w: 500, s: 'italic', tag: 'Medium Italic' },
            { w: 700, s: 'normal', tag: 'Bold' },
            { w: 700, s: 'italic', tag: 'Bold Italic' },
          ],
        },
        {
          label: 'Antykwa Torunska Condensed',
          family: 'Antykwa Torunska Condensed',
          variants: [
            { w: 400, s: 'normal', tag: 'Regular' },
            { w: 400, s: 'italic', tag: 'Italic' },
            { w: 500, s: 'normal', tag: 'Medium' },
            { w: 500, s: 'italic', tag: 'Medium Italic' },
          ],
        },
        {
          label: 'Antykwa Torunska Condensed Light',
          family: 'Antykwa Torunska Condensed Light',
          variants: [
            { w: 300, s: 'normal', tag: 'Light' },
            { w: 300, s: 'italic', tag: 'Light Italic' },
          ],
        },
        { label: 'ArtDystopia', family: 'ArtDystopia', variants: [{ w: 400, s: 'normal', tag: 'Regular' }] },
        { label: 'Brinky Mono', family: 'Brinky Mono', variants: [{ w: 400, s: 'normal', tag: 'Regular' }] },
        { label: 'Crosterian', family: 'Crosterian', variants: [{ w: 400, s: 'normal', tag: 'Regular' }] },
        { label: 'Cursyger', family: 'Cursyger', variants: [{ w: 400, s: 'normal', tag: 'Regular' }] },
        {
          label: 'Fifteen',
          family: 'Fifteen',
          variants: [
            { w: 100, s: 'normal', tag: 'Thin' },
            { w: 100, s: 'italic', tag: 'Thin Italic' },
            { w: 200, s: 'normal', tag: 'ExtraLight' },
            { w: 200, s: 'italic', tag: 'ExtraLight Italic' },
            { w: 300, s: 'normal', tag: 'Light' },
            { w: 300, s: 'italic', tag: 'Light Italic' },
            { w: 400, s: 'normal', tag: 'Regular' },
            { w: 400, s: 'italic', tag: 'Italic' },
            { w: 500, s: 'normal', tag: 'Medium' },
            { w: 500, s: 'italic', tag: 'Medium Italic' },
            { w: 600, s: 'normal', tag: 'SemiBold' },
            { w: 600, s: 'italic', tag: 'SemiBold Italic' },
            { w: 700, s: 'normal', tag: 'Bold' },
            { w: 700, s: 'italic', tag: 'Bold Italic' },
          ],
        },
        {
          label: 'Fira Sans Condensed',
          family: 'Fira Sans Condensed',
          variants: [
            { w: 100, s: 'normal', tag: 'Thin' },
            { w: 100, s: 'italic', tag: 'Thin Italic' },
            { w: 200, s: 'normal', tag: 'ExtraLight' },
            { w: 200, s: 'italic', tag: 'ExtraLight Italic' },
            { w: 300, s: 'normal', tag: 'Light' },
            { w: 300, s: 'italic', tag: 'Light Italic' },
            { w: 400, s: 'normal', tag: 'Regular' },
            { w: 400, s: 'italic', tag: 'Italic' },
            { w: 500, s: 'normal', tag: 'Medium' },
            { w: 500, s: 'italic', tag: 'Medium Italic' },
            { w: 600, s: 'normal', tag: 'SemiBold' },
            { w: 600, s: 'italic', tag: 'SemiBold Italic' },
            { w: 700, s: 'normal', tag: 'Bold' },
            { w: 700, s: 'italic', tag: 'Bold Italic' },
            { w: 800, s: 'normal', tag: 'ExtraBold' },
            { w: 800, s: 'italic', tag: 'ExtraBold Italic' },
            { w: 900, s: 'normal', tag: 'Black' },
            { w: 900, s: 'italic', tag: 'Black Italic' },
          ],
        },
        { label: 'Health Goth', family: 'Health Goth', variants: [{ w: 400, s: 'normal', tag: 'Regular' }] },
        { label: 'Intradistaff', family: 'Intradistaff', variants: [{ w: 400, s: 'normal', tag: 'Regular' }] },
        {
          label: 'LevType Hryvnia',
          family: 'LevType Hryvnia',
          variants: [
            { w: 100, s: 'normal', tag: 'Thin' },
            { w: 300, s: 'normal', tag: 'Light' },
            { w: 400, s: 'normal', tag: 'Regular' },
            { w: 500, s: 'normal', tag: 'Medium' },
            { w: 700, s: 'normal', tag: 'Bold' },
          ],
        },
        { label: 'Maratype', family: 'Maratype', variants: [{ w: 400, s: 'normal', tag: 'Regular' }] },
        { label: 'Old Horror Films', family: 'Old Horror Films', variants: [{ w: 400, s: 'normal', tag: 'Regular' }] },
        {
          label: 'Philosopher',
          family: 'Philosopher',
          variants: [
            { w: 400, s: 'normal', tag: 'Regular' },
            { w: 400, s: 'italic', tag: 'Italic' },
            { w: 700, s: 'normal', tag: 'Bold' },
            { w: 700, s: 'italic', tag: 'Bold Italic' },
          ],
        },
        { label: 'PT Mono', family: 'PT Mono', variants: [{ w: 400, s: 'normal', tag: 'Regular' }] },
        {
          label: 'Roboto',
          family: 'Roboto',
          variants: [
            { w: 100, s: 'normal', tag: 'Thin' },
            { w: 300, s: 'normal', tag: 'Light' },
            { w: 400, s: 'normal', tag: 'Regular' },
            { w: 400, s: 'italic', tag: 'Italic' },
            { w: 700, s: 'normal', tag: 'Bold' },
            { w: 700, s: 'italic', tag: 'Bold Italic' },
            { w: 900, s: 'normal', tag: 'Black' },
          ],
        },
        { label: 'Swampy Clean', family: 'Swampy Clean', variants: [{ w: 400, s: 'normal', tag: 'Regular' }] },
        { label: 'Swampy Dirt', family: 'Swampy Dirt', variants: [{ w: 400, s: 'normal', tag: 'Regular' }] },
        { label: 'Swampy Sand', family: 'Swampy Sand', variants: [{ w: 400, s: 'normal', tag: 'Regular' }] },
        { label: 'Tangak', family: 'Tangak', variants: [{ w: 400, s: 'normal', tag: 'Regular' }] },
        {
          label: 'Ubuntu Mono',
          family: 'Ubuntu Mono',
          variants: [
            { w: 400, s: 'normal', tag: 'Regular' },
            { w: 400, s: 'italic', tag: 'Italic' },
            { w: 700, s: 'normal', tag: 'Bold' },
            { w: 700, s: 'italic', tag: 'Bold Italic' },
          ],
        },
        { label: 'UnifrakturCook', family: 'UnifrakturCook', variants: [{ w: 700, s: 'normal', tag: 'Bold' }] },
      ]

      const inp = document.getElementById('inp')
      const sz = document.getElementById('sz')
      const szv = document.getElementById('szv')
      const grid = document.getElementById('grid')

      function buildGrid() {
        grid.innerHTML = ''
        const text = inp.value || '\u00a0'
        const size = sz.value + 'px'

        fonts.forEach((f) => {
          const card = document.createElement('div')
          card.className = 'card'

          const header = document.createElement('div')
          header.className = 'card-header'
          header.innerHTML =
            '<span class="fname">' +
            f.label +
            '</span>' +
            '<span class="fmeta">' +
            f.variants.length +
            ' variant' +
            (f.variants.length > 1 ? 's' : '') +
            '</span>'
          card.appendChild(header)

          const body = document.createElement('div')
          body.className = 'card-body'

          f.variants.forEach((v, i) => {
            const wrap = document.createElement('div')
            if (i > 0) wrap.className = 'variant-row'

            if (f.variants.length > 1) {
              const lbl = document.createElement('div')
              lbl.className = 'variant-label'
              lbl.textContent = v.tag
              wrap.appendChild(lbl)
            }

            const p = document.createElement('div')
            p.className = 'preview-line'
            p.style.fontFamily = "'" + f.family + "', serif"
            p.style.fontWeight = v.w
            p.style.fontStyle = v.s
            p.style.fontSize = size
            p.textContent = text
            wrap.appendChild(p)
            body.appendChild(wrap)
          })

          card.appendChild(body)
          grid.appendChild(card)
        })
      }

      function updatePreviews() {
        const text = inp.value || '\u00a0'
        const size = sz.value + 'px'
        document.querySelectorAll('.preview-line').forEach((el) => {
          el.textContent = text
          el.style.fontSize = size
        })
      }

      inp.addEventListener('input', updatePreviews)
      sz.addEventListener('input', () => {
        szv.textContent = sz.value + 'px'
        updatePreviews()
      })

      buildGrid()
    </script>
  </body>
</html>
